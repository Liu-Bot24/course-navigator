name: CourseNavigatorMobile
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  CourseNavigatorMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CourseNavigatorMobile
        excludes:
          - Resources/**
    resources:
      - path: CourseNavigatorMobile/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.coursenavigator.mobile
        PRODUCT_NAME: Course Navigator
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: CourseNavigatorMobile/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
